
; ESP32-S3-Pico Water System - Single Mode with Captive Portal Provisioning

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Partition scheme - duża aplikacja
board_build.partitions = huge_app.csv

; Flash settings
board_build.flash_mode = dio
board_build.f_flash = 80000000L

; Upload & Monitor
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -Isrc/config
    -Isrc/hardware
    -Isrc/algorithm
    -Isrc/web
    -Isrc/core
    -Isrc/network
    -Isrc/security
    -Isrc/crypto
    -Isrc/provisioning

lib_deps =
    Wire
    mathieucarbou/AsyncTCP@^3.2.14
    mathieucarbou/ESPAsyncWebServer@^3.3.23
    bblanchon/ArduinoJson@^7.4.2
    adafruit/RTClib@^2.1.1
    adafruit/Adafruit FRAM I2C
    https://github.com/DFRobot/DFRobot_DF1201S.git
